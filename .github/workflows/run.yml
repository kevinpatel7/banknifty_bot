name: BankNifty Auto Trader

on:
  schedule:
    - cron: '45 2 * * 1-5'  # 8:15 AM IST Mon-Fri (IST = UTC+5:30)
  workflow_dispatch:          # allows manual run anytime

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 480      # runs for up to 8 hours (full market day)

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install libraries
      run: |
        pip install yfinance pandas numpy scikit-learn pytz \
                    lightgbm xgboost hmmlearn tabulate \
                    requests beautifulsoup4 lxml openpyxl

    - name: Run BankNifty Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python banknifty_v8_server.py
